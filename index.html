<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaTone</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6efe4;
      --surface: rgba(255, 255, 255, 0.72);
      --text: #1e1d1a;
      --accent: #c95f3d;
      --accent-dark: #7f3523;
      --border: rgba(30, 29, 26, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(201, 95, 61, 0.24), transparent 34%),
        radial-gradient(circle at bottom right, rgba(127, 53, 35, 0.2), transparent 30%),
        linear-gradient(135deg, #f6efe4 0%, #efe4d0 100%);
      color: var(--text);
    }

    main {
      width: min(720px, 100%);
      padding: 56px 40px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--surface);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
    }

    .eyebrow {
      margin: 0 0 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.78rem;
      color: var(--accent-dark);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 8vw, 5.8rem);
      line-height: 0.95;
    }

    p {
      margin: 22px 0 0;
      max-width: 38rem;
      font-size: 1.1rem;
      line-height: 1.7;
    }

    a {
      color: var(--accent-dark);
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    .pill {
      display: inline-block;
      margin-top: 28px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 0.95rem;
      text-decoration: none;
    }

    .pill:hover {
      background: var(--accent-dark);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">GitHub Pages Ready</p>
    <h1>NovaTone</h1>
    <p>
      This repository is live-ready for GitHub Pages. Replace this landing page
      with your project, portfolio, product, or release notes whenever you are
      ready to publish the real site.
    </p>
    <a class="pill" href="https://github.com/Bparker81597/NovaTone">View Repository</a>
  </main>
</body>
</html>
